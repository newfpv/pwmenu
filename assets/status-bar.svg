<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="260" viewBox="0 0 1000 260" role="img" aria-labelledby="title desc">
  <title id="title">A_pwmenu status indicators</title>
  <desc id="desc">Pwnagotchi display mockup showing GPS, Bluetooth, and internet connection indicators.</desc>
  <rect width="1000" height="260" rx="28" fill="#f4f4f0"/>
  <rect x="28" y="28" width="944" height="128" rx="14" fill="#ffffff" stroke="#111111" stroke-width="4"/>
  <g fill="#111111" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="55" y="82" font-size="34" font-weight="700">CH -</text>
    <text x="175" y="82" font-size="34" font-weight="700">APS 0</text>
    <text x="360" y="82" font-size="34" font-weight="700">G</text>
    <text x="405" y="82" font-size="34">C</text>
    <text x="485" y="82" font-size="34" font-weight="700">BT</text>
    <text x="560" y="82" font-size="34">C</text>
    <text x="640" y="82" font-size="34" font-weight="700">WWW</text>
    <text x="755" y="82" font-size="34">C</text>
    <text x="835" y="82" font-size="34" font-weight="700">UP</text>
    <text x="55" y="132" font-size="22">A_pwmenu 1.1.0 · compact connection status</text>
  </g>
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21" fill="#333333">
    <circle cx="72" cy="205" r="8" fill="#30a46c"/>
    <text x="92" y="212"><tspan font-weight="700">G C</tspan> — fresh GPS fix</text>
    <circle cx="350" cy="205" r="8" fill="#30a46c"/>
    <text x="370" y="212"><tspan font-weight="700">BT C</tspan> — Bluetooth PAN</text>
    <circle cx="720" cy="205" r="8" fill="#30a46c"/>
    <text x="740" y="212"><tspan font-weight="700">WWW C</tspan> — internet online</text>
  </g>
</svg>

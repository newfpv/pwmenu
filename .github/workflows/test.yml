name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install flask requests websockets

      - name: Compile plugin
        run: python -m py_compile A_pwmenu.py

      - name: Run tests
        run: python -m unittest discover -s tests -v
